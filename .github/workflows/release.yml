name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and image name
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_without_v=${VERSION#v}" >> "$GITHUB_OUTPUT"
          # Docker repository names must be lowercase
          IMAGE="${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # ── Docker Login ──────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Set up Docker Buildx ─────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & push unified image ───────────────────────────────
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_without_v }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: Release ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          body: |
            ## Docker Image

            Pull the unified image from GitHub Container Registry:

            ```bash
            docker pull ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_without_v }}
            ```

            ### Quick Start

            ```bash
            TAG=${{ steps.meta.outputs.version_without_v }}
            IMAGE=${{ steps.meta.outputs.image }}:$TAG

            docker run -d \
              --name releasehub \
              -p 8080:80 \
              -v releasehub-data:/data \
              -e RELEASEHUB_APP_ENV=production \
              -e RELEASEHUB_HTTP_HOST=0.0.0.0 \
              -e RELEASEHUB_HTTP_PORT=8080 \
              -e RELEASEHUB_DATABASE_DSN=/data/releasehub.db \
              -e RELEASEHUB_STORAGE_DATA_DIR=/data/releases \
              $IMAGE
            ```

            Or with docker compose:

            ```bash
            RELEASEHUB_IMAGE=$IMAGE docker compose -f docker/compose.sqlite.yml up -d
            ```
